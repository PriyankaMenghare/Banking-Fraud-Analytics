version: 2

sources:
  - name: banking_source
    database: '{{ target.database}}'
    schema: source
    config:
      freshness:
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour}
    loaded_at_field: date
    tables:
      - name: transactions_data
        description: "Raw transactions data"
      - name: users_data
        description: "Raw users/customers data"
      - name: cards_data
        description: "Raw cards data"