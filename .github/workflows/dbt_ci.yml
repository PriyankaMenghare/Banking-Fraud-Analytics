name: dbt CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          cd banking_fraud_analytics
          uv venv
          uv pip install dbt-databricks

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          banking_fraud_analytics:
            outputs:
              dev:
                type: databricks
                catalog: ${{ secrets.DBT_CATALOG }}
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                schema: default
                threads: 4
            target: dev
          EOF
      - name: Prepare seed files for CI
        run: |
          cd banking_fraud_analytics
          head -21 seeds/train_fraud_labels.csv > seeds/train_fraud_labels_ci.csv
          mv seeds/train_fraud_labels_ci.csv seeds/train_fraud_labels.csv
          echo "train_fraud_labels truncated to $(wc -l < seeds/train_fraud_labels.csv) rows"
          echo "mcc_codes has $(wc -l < seeds/mcc_codes.csv) rows"

      - name: dbt deps
        run: |
          cd banking_fraud_analytics
          .venv/bin/dbt deps

      - name: dbt debug
        run: |
          cd banking_fraud_analytics
          .venv/bin/dbt debug

      - name: dbt compile
        run: |
          cd banking_fraud_analytics
          .venv/bin/dbt compile --select bronze

      - name: dbt test
        run: |
          cd banking_fraud_analytics
          .venv/bin/dbt test --select bronze --exclude source:*